<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>бургер чеддер</title>
</head>
<body>
    <section class="wraper">
        <header class="header">
            <div class="header__container container">
                <div class="header__logo">
                    <img src="img/LOGO.svg" alt="logo">
                </div>
                <nav class="header__menu">
                    <ul class="menu__list">
                        <li class="menu__item"><a href="" class="menu__link">Почему у нас</a></li>
                        <li class="menu__item"><a href="" class="menu__link">Меню бургеров</a></li>
                        <li class="menu__item"><a href="" class="menu__link">Оформление заказа</a></li>
                    </ul>
                </nav>
                <div class="header__currency" title="Изменить валюту">$</div>
            </div>
        </header>
        <main class="main">
            <section class="main__info info">
                <div class="info__container container">
                    <div class="info__content">
                        <div class="info__header">
                            <span class="info__small-info">Новое меню</span>
                            <h1 class="info__title">бургер чеддер</h1>
                        </div>
                        <p class="info__text">
                            Мы обновили наше меню, спешите попробовать сезонные новинки и насладиться отличным вкусом наших бургеров. Готовим для вас лучшие бургеры в городе из отборной мраморной говядины.
                        </p>
                        <div class="info__action">
                            <button class="info__button">Смотреть меню</button>
                        </div>
                    </div>
                <img src="img/main_burger.png" alt="burger" class="main__main-image">
            </div>
            </section>
        </main>
        <footer class="footer">
            <div class="footer__container container">
            </div>
        </footer>
    </section>
</body>
</html>
